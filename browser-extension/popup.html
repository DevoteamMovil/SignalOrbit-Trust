<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SignalOrbit Integrity</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 380px;
      background: #0f0f13;
      color: #e8e8f0;
      font-size: 13px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      background: linear-gradient(135deg, #1a0a2e 0%, #2d1060 100%);
      border-bottom: 1px solid #3a1a6e;
    }
    .header-logo { font-size: 20px; }
    .header-title { font-size: 14px; font-weight: 700; color: #c084fc; letter-spacing: 0.3px; }
    .header-sub { font-size: 11px; color: #7c6a9a; margin-top: 1px; }

    /* ── Status banner ── */
    .status-banner {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid #1e1e2e;
    }
    .status-icon { font-size: 28px; flex-shrink: 0; }
    .status-label { font-size: 15px; font-weight: 700; }
    .status-sub { font-size: 11px; color: #7c6a9a; margin-top: 2px; }

    .status-clean    { background: #0a1f0a; }
    .status-low      { background: #1a1f0a; }
    .status-medium   { background: #1f1500; }
    .status-high     { background: #1f0a0a; }
    .status-critical { background: #1a0a2e; border-left: 3px solid #9c27b0; }

    .label-clean    { color: #4caf50; }
    .label-low      { color: #8bc34a; }
    .label-medium   { color: #ff9800; }
    .label-high     { color: #f44336; }
    .label-critical { color: #ce93d8; }

    /* ── Score bar ── */
    .score-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid #1e1e2e;
    }
    .score-label { font-size: 11px; color: #7c6a9a; width: 80px; flex-shrink: 0; }
    .score-bar-wrap { flex: 1; height: 6px; background: #2a2a3e; border-radius: 3px; overflow: hidden; }
    .score-bar { height: 100%; border-radius: 3px; transition: width 0.3s; }
    .score-value { font-size: 12px; font-weight: 700; width: 32px; text-align: right; }

    /* ── Events list ── */
    .events-header {
      padding: 10px 16px 6px;
      font-size: 11px;
      font-weight: 600;
      color: #7c6a9a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .events-list { max-height: 280px; overflow-y: auto; }
    .events-list::-webkit-scrollbar { width: 4px; }
    .events-list::-webkit-scrollbar-track { background: #1a1a2e; }
    .events-list::-webkit-scrollbar-thumb { background: #3a2a5e; border-radius: 2px; }

    .event-item {
      padding: 10px 16px;
      border-bottom: 1px solid #1a1a2e;
      cursor: pointer;
      transition: background 0.15s;
    }
    .event-item:hover { background: #1a1a2e; }

    .event-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .event-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .badge-low      { background: #1a2a0a; color: #8bc34a; }
    .badge-medium   { background: #2a1a00; color: #ff9800; }
    .badge-high     { background: #2a0a0a; color: #f44336; }
    .badge-critical { background: #1a0a2e; color: #ce93d8; }

    .event-type { font-size: 11px; color: #9a8ab0; }
    .event-score { margin-left: auto; font-size: 11px; font-weight: 700; }

    .event-domain { font-size: 12px; font-weight: 600; color: #c084fc; }
    .event-prompt {
      font-size: 11px;
      color: #7c6a9a;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .event-keywords {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 5px;
    }
    .kw-chip {
      font-size: 10px;
      background: #2a1a3e;
      color: #c084fc;
      padding: 1px 6px;
      border-radius: 10px;
    }
    .event-mitre { font-size: 10px; color: #5a4a7a; margin-top: 4px; }

    /* ── Empty state ── */
    .empty {
      padding: 24px 16px;
      text-align: center;
      color: #4a3a6a;
    }
    .empty-icon { font-size: 32px; margin-bottom: 8px; }
    .empty-text { font-size: 12px; }

    /* ── Footer ── */
    .footer {
      padding: 8px 16px;
      font-size: 10px;
      color: #3a2a5a;
      border-top: 1px solid #1a1a2e;
      display: flex;
      justify-content: space-between;
    }
    .footer a { color: #5a3a8a; text-decoration: none; }
    .footer a:hover { color: #c084fc; }

    .scanning { padding: 20px 16px; text-align: center; color: #5a4a7a; font-size: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo">🛡️</div>
    <div>
      <div class="header-title">SignalOrbit Integrity</div>
      <div class="header-sub">AI Recommendation Poisoning Detector</div>
    </div>
  </div>

  <div id="root">
    <div class="scanning">Scanning page…</div>
  </div>

  <div class="footer">
    <span id="footer-url"></span>
    <span id="footer-time"></span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
